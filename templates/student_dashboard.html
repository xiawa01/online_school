<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xialin - 在线汉语学习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; }
        .header { background: white; padding: 16px 32px; border-bottom: 1px solid #e9eef3; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; }
        .stat-value { font-size: 32px; font-weight: 700; color: #3b82f6; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .lesson-item { background: #f8fafc; padding: 16px; margin: 12px 0; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #e2e8f0; }
        .badge.completed { background: #d1fae5; color: #065f46; }
        .badge.sync { background: #dbeafe; color: #1e40af; }
        .hidden { display: none; }
        .login-card { max-width: 400px; margin: 100px auto; background: white; border-radius: 28px; padding: 40px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; }
    </style>
</head>
<body>
    <div id="loginView" class="login-card">
        <h2 style="text-align: center;">🎓 Xialin</h2>
        <p style="text-align: center; margin-bottom: 24px;">Школа китайского языка</p>
        <input type="text" id="username" placeholder="Логин" value="student">
        <input type="password" id="password" placeholder="Пароль" value="student123">
        <button onclick="doLogin()">Войти</button>
        <div id="loginError" class="error hidden"></div>
    </div>

    <div id="dashboard" class="hidden">
        <div class="header">
            <div class="logo" onclick="location.href='/student/'">🎓 Xialin | 汉语学习</div>
            <div>
                <span id="userName"></span>
                <button onclick="logout()" style="background: #e2e8f0; color: #1e293b; margin-left: 16px;">退出 | Выйти</button>
            </div>
        </div>
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-title">学习进度 | Прогресс</div><div class="stat-value" id="progressPercent">0</div><div>%</div></div>
                <div class="stat-card"><div class="stat-title">已完成 | Пройдено</div><div class="stat-value" id="completedCount">0</div></div>
                <div class="stat-card"><div class="stat-title">总课程 | Всего уроков</div><div class="stat-value" id="totalCount">0</div></div>
            </div>
            <div class="card">
                <h3>📚 我的课程 | Мои уроки</h3>
                <div id="lessonsList"></div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let allLessons = [];

        async function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = data.user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('userName').innerText = currentUser.name;
                await loadLessons();
            } else {
                document.getElementById('loginError').innerText = 'Ошибка входа';
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        async function loadLessons() {
            const res = await fetch('/api/lessons/');
            allLessons = await res.json();
            const completed = currentUser.progress.length;
            const percent = allLessons.length ? Math.round((completed / allLessons.length) * 100) : 0;
            document.getElementById('progressPercent').innerText = percent;
            document.getElementById('completedCount').innerText = completed;
            document.getElementById('totalCount').innerText = allLessons.length;
            
            const container = document.getElementById('lessonsList');
            if (allLessons.length === 0) {
                container.innerHTML = '<p>暂无课程 | Нет уроков</p>';
            } else {
                container.innerHTML = allLessons.map(lesson => {
                    const isCompleted = currentUser.progress.includes(lesson.id);
                    const isSync = lesson.lesson_type === 'sync';
                    return `
                        <div class="lesson-item">
                            <div>
                                <strong>${lesson.title}</strong>
                                <div><span class="badge ${isCompleted ? 'completed' : ''} ${isSync ? 'sync' : ''}">${isSync ? '🎬 直播 | Живой урок' : (isCompleted ? '✅ 已完成 | Пройдено' : '📝 未开始 | Не начат')}</span></div>
                            </div>
                            <div>
                                ${isSync ? `<button onclick="joinClass(${lesson.id})">🎥 进入课堂 | Войти в класс</button>` : `<button onclick="openLesson(${lesson.id})">📖 学习 | Изучать</button>`}
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function openLesson(id) { window.location.href = `/lesson/?id=${id}`; }
        function joinClass(id) { window.location.href = `/virtual-class/?lesson_id=${id}`; }
        function logout() { localStorage.removeItem('currentUser'); location.reload(); }

        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            loadLessons();
        }
    </script>
</body>
</html>
