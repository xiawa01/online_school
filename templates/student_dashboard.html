<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xialin - Моё обучение</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f7fb; }
        .header { background: white; padding: 16px 32px; border-bottom: 1px solid #e9eef3; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .logo { font-size: 24px; font-weight: 700; cursor: pointer; }
        .logo span { color: #3b82f6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; }
        .stat-value { font-size: 32px; font-weight: 700; color: #3b82f6; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .lesson-item { background: #f8fafc; padding: 16px; margin: 12px 0; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .progress-bar { height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #3b82f6; width: 0%; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        button.sync { background: #10b981; }
        .login-card { max-width: 400px; margin: 100px auto; background: white; border-radius: 28px; padding: 40px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; }
        .hidden { display: none; }
        .error { color: #ef4444; }
        .badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #e2e8f0; }
        .badge.completed { background: #d1fae5; color: #065f46; }
        .badge.sync { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <div id="loginView" class="login-card">
        <div class="logo" style="text-align: center;">Xialin<span>.</span></div>
        <h2>Вход в платформу</h2>
        <input type="text" id="username" placeholder="Логин" value="student">
        <input type="password" id="password" placeholder="Пароль" value="student123">
        <button onclick="doLogin()" style="width: 100%;">Войти</button>
        <div id="loginError" class="error hidden"></div>
        <p style="margin-top: 16px; font-size: 12px; text-align: center;">Тестовые входы: student/student123, teacher/teacher123</p>
    </div>

    <div id="dashboard" class="hidden">
        <div class="header">
            <div class="logo" onclick="goHome()">Xialin<span>.</span></div>
            <div>
                <span id="userName"></span>
                <button onclick="goToClass()" class="sync" style="margin-left: 16px;">🎥 Войти в класс</button>
                <button onclick="logout()" style="background: #e2e8f0; color: #1e293b; margin-left: 16px;">Выйти</button>
            </div>
        </div>
        <div class="container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-title">Прогресс</div><div class="stat-value" id="progressPercent">0</div><div>%</div></div>
                <div class="stat-card"><div class="stat-title">Пройдено</div><div class="stat-value" id="completedCount">0</div></div>
                <div class="stat-card"><div class="stat-title">Всего уроков</div><div class="stat-value" id="totalCount">0</div></div>
            </div>
            <div class="card">
                <h3>📖 Мои уроки</h3>
                <div id="lessonsList"></div>
            </div>
        </div>
    </div>

<script>
    let currentUser = null;
    let allLessons = [];

    function goHome() { window.location.href = '/'; }
    function goToClass() { window.location.href = '/virtual-class/?lesson_id=1'; }

    async function doLogin() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/api/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
            currentUser = data.user;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userName').innerText = currentUser.name;
            await loadLessons();
        } else {
            document.getElementById('loginError').innerText = 'Ошибка входа';
            document.getElementById('loginError').classList.remove('hidden');
        }
    }

    async function loadLessons() {
        const res = await fetch('/api/lessons/');
        allLessons = await res.json();
        const completed = currentUser.progress.length;
        const percent = allLessons.length ? Math.round((completed / allLessons.length) * 100) : 0;
        document.getElementById('progressPercent').innerText = percent;
        document.getElementById('completedCount').innerText = completed;
        document.getElementById('totalCount').innerText = allLessons.length;
        
        const container = document.getElementById('lessonsList');
        if (allLessons.length === 0) {
            container.innerHTML = '<p>Нет уроков</p>';
        } else {
            container.innerHTML = allLessons.map(lesson => {
                const isCompleted = currentUser.progress.includes(lesson.id);
                const isSync = lesson.lesson_type === 'sync';
                return `
                    <div class="lesson-item">
                        <div>
                            <strong>${lesson.title}</strong>
                            <div><span class="badge ${isCompleted ? 'completed' : ''} ${isSync ? 'sync' : ''}">${isSync ? '🎬 Живой урок' : (isCompleted ? '✅ Пройдено' : '📝 Не начат')}</span></div>
                        </div>
                        <div>
                            ${isSync ? `<button class="sync" onclick="joinClass(${lesson.id})">🎥 Войти в класс</button>` : `<button onclick="openLesson(${lesson.id})">📖 Изучать</button>`}
                        </div>
                    </div>
                `;
            }).join('');
        }
    }

    function openLesson(id) { window.location.href = `/lesson/?id=${id}`; }
    function joinClass(id) { window.location.href = `/virtual-class/?lesson_id=${id}`; }

    function logout() {
        currentUser = null;
        localStorage.removeItem('currentUser');
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('dashboard').classList.add('hidden');
    }

    // Проверка сохранённой сессии
    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('userName').innerText = currentUser.name;
        loadLessons();
    }
</script>
</body>
</html>
