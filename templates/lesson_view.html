<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр урока - Anecole</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f7fb; }
        .header { background: white; padding: 16px 32px; border-bottom: 1px solid #e9eef3; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 700; }
        .logo span { color: #3b82f6; }
        .container { max-width: 800px; margin: 0 auto; padding: 32px; }
        .card { background: white; border-radius: 24px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .lesson-title { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
        .lesson-content { font-size: 16px; line-height: 1.6; color: #1e293b; margin-bottom: 24px; }
        .video-container { margin: 20px 0; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .test-area { background: #fef3c7; border-radius: 20px; padding: 24px; margin: 24px 0; }
        .homework-area { background: #e0f2fe; border-radius: 20px; padding: 24px; margin: 24px 0; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; margin-top: 8px; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; font-size: 16px; font-weight: 500; margin-top: 16px; }
        button.secondary { background: #e2e8f0; color: #1e293b; }
        button.success { background: #10b981; }
        .progress-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 16px; }
        .progress-badge.completed { background: #d1fae5; color: #065f46; }
        .progress-badge.pending { background: #fee2e2; color: #991b1b; }
        .feedback { padding: 16px; border-radius: 16px; margin-top: 16px; }
        .feedback.success { background: #d1fae5; color: #065f46; }
        .feedback.error { background: #fee2e2; color: #991b1b; }
        .hidden { display: none; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #3b82f6; text-decoration: none; }
        .options { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
        .option { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 16px; background: #f1f5f9; border-radius: 40px; }
        .option.selected { background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Anecole<span>.</span></div>
        <a href="/" style="text-decoration: none; color: #5a6874;">← На главную</a>
    </div>
    
    <div class="container" id="app">
        <div class="card">
            <div id="loading">Загрузка урока...</div>
            
            <div id="lessonContent" class="hidden">
                <span id="progressBadge" class="progress-badge"></span>
                <h1 id="lessonTitle" class="lesson-title"></h1>
                <div id="lessonText" class="lesson-content"></div>
                
                <div id="videoBlock" class="video-container hidden"></div>
                
                <!-- Тест -->
                <div id="testBlock" class="test-area hidden">
                    <h3>📝 Проверка знаний</h3>
                    <p id="testQuestion" style="margin: 16px 0; font-weight: 500;"></p>
                    <div id="testOptions" class="options"></div>
                    <div id="testFeedback"></div>
                    <button id="submitTestBtn" class="success">✅ Проверить тест</button>
                </div>
                
                <!-- Домашнее задание -->
                <div id="homeworkBlock" class="homework-area hidden">
                    <h3>🏠 Домашнее задание</h3>
                    <p id="homeworkTask" style="margin: 8px 0 16px 0; color: #475569;"></p>
                    <textarea id="homeworkAnswer" rows="4" placeholder="Напишите ваше решение..."></textarea>
                    <div id="homeworkFeedback"></div>
                    <button id="submitHomeworkBtn">📤 Отправить на проверку</button>
                </div>
                
                <div style="display: flex; justify-content: space-between; margin-top: 32px;">
                    <a href="/" class="back-link">← Вернуться к урокам</a>
                    <div id="completeStatus"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lessonId = urlParams.get('id');
        let currentUser = null;
        let currentLesson = null;
        let selectedAnswer = null;
        
        // Загрузка пользователя
        async function loadUser() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                return true;
            }
            // Пробуем войти как student
            const res = await fetch('/api/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'student', password: 'student123' })
            });
            const data = await res.json();
            if (data.success) {
                currentUser = data.user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                return true;
            }
            return false;
        }
        
        // Загрузка урока
        async function loadLesson() {
            try {
                const res = await fetch(`/api/lessons/${lessonId}/`);
                currentLesson = await res.json();
                renderLesson();
            } catch(e) {
                document.getElementById('loading').innerHTML = 'Ошибка загрузки урока';
                console.error(e);
            }
        }
        
        function renderLesson() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('lessonContent').classList.remove('hidden');
            
            const isCompleted = currentUser.progress.includes(parseInt(lessonId));
            const badge = document.getElementById('progressBadge');
            if (isCompleted) {
                badge.textContent = '✅ Урок пройден';
                badge.classList.add('completed');
            } else {
                badge.textContent = '📖 В процессе';
                badge.classList.add('pending');
            }
            
            document.getElementById('lessonTitle').textContent = currentLesson.title;
            document.getElementById('lessonText').innerHTML = currentLesson.content || 'Содержание урока не добавлено.';
            
            // Видео
            if (currentLesson.video_url && currentLesson.video_url.includes('youtube')) {
                const videoId = currentLesson.video_url.split('v=')[1]?.split('&')[0];
                if (videoId) {
                    const videoBlock = document.getElementById('videoBlock');
                    videoBlock.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
                    videoBlock.classList.remove('hidden');
                }
            }
            
            // Тест
            if (currentLesson.test && !isCompleted) {
                const testBlock = document.getElementById('testBlock');
                testBlock.classList.remove('hidden');
                
                if (currentLesson.test.questions && currentLesson.test.questions[0]) {
                    const q = currentLesson.test.questions[0];
                    document.getElementById('testQuestion').textContent = q.text;
                    
                    const optionsDiv = document.getElementById('testOptions');
                    optionsDiv.innerHTML = '';
                    if (q.options) {
                        q.options.forEach(opt => {
                            const optDiv = document.createElement('div');
                            optDiv.className = 'option';
                            optDiv.textContent = opt;
                            optDiv.onclick = () => {
                                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                                optDiv.classList.add('selected');
                                selectedAnswer = opt;
                            };
                            optionsDiv.appendChild(optDiv);
                        });
                    }
                } else if (currentLesson.test.question) {
                    document.getElementById('testQuestion').textContent = currentLesson.test.question;
                    document.getElementById('testOptions').innerHTML = '';
                    selectedAnswer = null;
                }
                
                document.getElementById('submitTestBtn').onclick = submitTest;
            }
            
            // Домашнее задание
            if (currentLesson.homework_task) {
                const homeworkBlock = document.getElementById('homeworkBlock');
                homeworkBlock.classList.remove('hidden');
                document.getElementById('homeworkTask').textContent = currentLesson.homework_task;
                document.getElementById('submitHomeworkBtn').onclick = submitHomework;
            }
        }
        
        async function submitTest() {
            const answer = selectedAnswer || document.getElementById('testOptions').querySelector('input')?.value;
            if (!answer) {
                alert('Выберите или введите ответ');
                return;
            }
            
            const correctAnswer = currentLesson.test.answers?.[1] || currentLesson.test.answer;
            if (answer.toLowerCase() === correctAnswer?.toLowerCase()) {
                document.getElementById('testFeedback').innerHTML = '<div class="feedback success">✅ Правильно! Урок пройден!</div>';
                await completeLesson();
            } else {
                document.getElementById('testFeedback').innerHTML = `<div class="feedback error">❌ Неправильно. Правильный ответ: ${correctAnswer}</div>`;
            }
        }
        
        async function completeLesson() {
            const res = await fetch('/api/complete-lesson/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUser.id, lessonId: parseInt(lessonId) })
            });
            const data = await res.json();
            if (data.success) {
                currentUser.progress = data.progress;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                document.getElementById('testBlock').classList.add('hidden');
                document.getElementById('progressBadge').textContent = '✅ Урок пройден';
                document.getElementById('progressBadge').classList.add('completed');
                document.getElementById('completeStatus').innerHTML = '<span style="color: #10b981;">🎉 Урок успешно завершён!</span>';
            }
        }
        
        async function submitHomework() {
            const answer = document.getElementById('homeworkAnswer').value;
            if (!answer) {
                alert('Напишите домашнее задание');
                return;
            }
            
            const res = await fetch('/api/submit-homework/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ answer: answer })
            });
            const data = await res.json();
            document.getElementById('homeworkFeedback').innerHTML = `<div class="feedback success">🤖 ${data.feedback}</div>`;
            document.getElementById('homeworkAnswer').disabled = true;
            document.getElementById('submitHomeworkBtn').disabled = true;
        }
        
        // Инициализация
        (async () => {
            const loggedIn = await loadUser();
            if (!loggedIn) {
                window.location.href = '/';
                return;
            }
            await loadLesson();
        })();
    </script>
</body>
</html>
