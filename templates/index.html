<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anecole - Панель учителя</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            color: #1a1f2e;
        }
        .app { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e9eef3;
            padding: 28px 20px;
            position: fixed;
            height: 100vh;
        }
        .logo { font-size: 24px; font-weight: 700; margin-bottom: 40px; }
        .logo span { color: #3b82f6; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin: 4px 0;
            border-radius: 12px;
            color: #5a6874;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active {
            background: #3b82f6;
            color: white;
        }
        
        .main {
            flex: 1;
            margin-left: 260px;
            padding: 28px 32px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .page-title { font-size: 28px; font-weight: 600; }
        .avatar {
            width: 44px; height: 44px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .stat-title { font-size: 14px; color: #8e9aaf; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 700; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }
        button.secondary { background: #e2e8f0; color: #1e293b; }
        button.danger { background: #ef4444; }
        button.success { background: #10b981; margin-top: 20px; }
        
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px 0;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
        }
        label { font-weight: 500; display: block; margin-top: 12px; }
        
        .hidden { display: none; }
        
        .login-card {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 28px;
            padding: 40px;
        }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
        }
        .flex { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        
        .lesson-row {
            background: #f8fafc;
            padding: 16px;
            margin: 12px 0;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .error { color: #ef4444; margin-top: 8px; }
        .success-msg { color: #10b981; margin-top: 8px; }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- Логин -->
    <div id="loginView" class="login-card">
        <h1>🎓 Anecole</h1>
        <p>Вход для учителя</p>
        <input type="text" id="username" placeholder="Логин" value="teacher">
        <input type="password" id="password" placeholder="Пароль" value="teacher123">
        <button onclick="doLogin()" style="width: 100%;">Войти</button>
        <div id="loginError" class="error"></div>
    </div>

    <!-- Панель учителя -->
    <div id="dashboardView" class="hidden" style="width: 100%;">
        <div class="sidebar">
            <div class="logo">Anecole<span>.</span></div>
            <div class="nav-item active" onclick="showTab('dashboard')">📊 Дашборд</div>
            <div class="nav-item" onclick="showTab('courses')">📚 Курсы и уроки</div>
            <div class="nav-item" onclick="showTab('homework')">📝 Проверка ДЗ</div>
        </div>
        
        <div class="main">
            <div class="top-bar">
                <h1 class="page-title" id="pageTitle">Дашборд учителя</h1>
                <div class="avatar" onclick="doLogout()">👤</div>
            </div>
            
            <div id="tab-dashboard">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-title">Учеников</div><div class="stat-value" id="totalStudents">0</div></div>
                    <div class="stat-card"><div class="stat-title">Курсов</div><div class="stat-value" id="totalCourses">0</div></div>
                    <div class="stat-card"><div class="stat-title">На проверке ДЗ</div><div class="stat-value" id="pendingHomeworks">0</div></div>
                    <div class="stat-card"><div class="stat-title">Уроков всего</div><div class="stat-value" id="totalLessons">0</div></div>
                </div>
                <div class="card">
                    <h3>📋 Быстрые действия</h3>
                    <button onclick="openCreateModal()">+ Создать новый урок</button>
                </div>
            </div>
            
            <div id="tab-courses" class="hidden">
                <div style="margin-bottom: 20px;">
                    <button onclick="openCreateModal()">+ Создать урок</button>
                </div>
                <div class="card">
                    <h3>📖 Список уроков</h3>
                    <div id="coursesList">Загрузка...</div>
                </div>
            </div>
            
            <div id="tab-homework" class="hidden">
                <div class="card">
                    <h3>📝 Домашние задания</h3>
                    <div id="allHomeworkList">Загрузка...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модалка создания урока -->
<div id="createModal" class="modal hidden">
    <div class="modal-content">
        <h3>📝 Создание урока</h3>
        
        <label>Название урока *</label>
        <input type="text" id="lessonTitle" placeholder="Например: Введение в Python">
        
        <label>Тип урока</label>
        <select id="lessonType">
            <option value="async">📚 Асинхронный</option>
            <option value="sync">🎬 Синхронный (живой)</option>
        </select>
        
        <div id="asyncFields">
            <label>Содержание урока</label>
            <textarea id="contentText" rows="4" placeholder="Текст урока..."></textarea>
            
            <label>Видео (YouTube ссылка)</label>
            <input type="text" id="videoUrl" placeholder="https://youtube.com/...">
            
            <label>Домашнее задание</label>
            <textarea id="homeworkTask" rows="3" placeholder="Опишите задание..."></textarea>
            
            <label>Тест (вопрос)</label>
            <input type="text" id="testQuestion" placeholder="Вопрос">
            
            <label>Правильный ответ</label>
            <input type="text" id="testAnswer" placeholder="Ответ">
        </div>
        
        <div id="syncFields" class="hidden">
            <label>Дата и время</label>
            <input type="datetime-local" id="scheduledStart">
            
            <label>Длительность (минут)</label>
            <input type="number" id="durationMinutes" value="60">
            
            <label><input type="checkbox" id="enableRecording"> Запись урока</label>
        </div>
        
        <div id="modalMessage"></div>
        
        <div class="flex">
            <button onclick="closeModal()" class="secondary">Отмена</button>
            <button onclick="createLesson()" class="success">Создать урок</button>
        </div>
    </div>
</div>

<script>
    let currentUser = null;

    async function doLogin() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        try {
            const res = await fetch('/api/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            if (data.success && data.user.role === 'teacher') {
                currentUser = data.user;
                document.getElementById('loginView').style.display = 'none';
                document.getElementById('dashboardView').classList.remove('hidden');
                loadTeacherData();
            } else {
                document.getElementById('loginError').innerText = 'Доступ только для учителей';
            }
        } catch(e) {
            document.getElementById('loginError').innerText = 'Ошибка подключения';
        }
    }
    
    async function loadTeacherData() {
        try {
            const res = await fetch('/api/lessons/');
            const lessons = await res.json();
            
            document.getElementById('totalLessons').innerText = lessons.length;
            document.getElementById('totalCourses').innerText = '2';
            document.getElementById('totalStudents').innerText = '1';
            document.getElementById('pendingHomeworks').innerText = '0';
            
            const container = document.getElementById('coursesList');
            if (container) {
                if (lessons.length === 0) {
                    container.innerHTML = '<p style="color: #8e9aaf;">Нет уроков. Создайте первый урок!</p>';
                } else {
                    container.innerHTML = '';
                    lessons.forEach(lesson => {
                        const div = document.createElement('div');
                        div.className = 'lesson-row';
                        div.innerHTML = `
                            <div>
                                <strong>${lesson.title}</strong><br>
                                <small>${lesson.lesson_type === 'sync' ? '🎬 Синхронный' : '📚 Асинхронный'}</small>
                            </div>
                            <div>
                                <button class="secondary" onclick="editLesson(${lesson.id})">✏️</button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            }
            
            const homeworkContainer = document.getElementById('allHomeworkList');
            if (homeworkContainer) {
                homeworkContainer.innerHTML = '<p style="color: #8e9aaf;">Нет заданий на проверку</p>';
            }
        } catch(e) {
            console.error(e);
        }
    }
    
    function showTab(tab) {
        document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
        
        const titles = { dashboard: 'Дашборд учителя', courses: 'Курсы и уроки', homework: 'Проверка ДЗ' };
        document.getElementById('pageTitle').innerText = titles[tab];
        
        document.querySelectorAll('.nav-item').forEach((item, i) => {
            item.classList.remove('active');
            if (item.innerText.includes(titles[tab]?.split(' ')[0] || tab)) {
                item.classList.add('active');
            }
        });
    }
    
    function openCreateModal() {
        document.getElementById('createModal').classList.remove('hidden');
        document.getElementById('modalMessage').innerHTML = '';
    }
    
    function closeModal() {
        document.getElementById('createModal').classList.add('hidden');
        document.getElementById('lessonTitle').value = '';
        document.getElementById('contentText').value = '';
        document.getElementById('videoUrl').value = '';
        document.getElementById('homeworkTask').value = '';
        document.getElementById('testQuestion').value = '';
        document.getElementById('testAnswer').value = '';
    }
    
    // Переключение полей в зависимости от типа урока
    document.getElementById('lessonType').addEventListener('change', function() {
        const isSync = this.value === 'sync';
        document.getElementById('asyncFields').style.display = isSync ? 'none' : 'block';
        document.getElementById('syncFields').style.display = isSync ? 'block' : 'none';
    });
    
    async function createLesson() {
        const title = document.getElementById('lessonTitle').value;
        if (!title) {
            alert('Введите название урока');
            return;
        }
        
        const lessonType = document.getElementById('lessonType').value;
        const testData = {};
        
        if (lessonType === 'async') {
            const question = document.getElementById('testQuestion').value;
            const answer = document.getElementById('testAnswer').value;
            if (question && answer) {
                testData.questions = [{ id: 1, text: question }];
                testData.answers = { 1: answer };
            }
        }
        
        const data = {
            module_id: 1,
            title: title,
            lesson_type: lessonType,
            content_text: document.getElementById('contentText').value,
            video_url: document.getElementById('videoUrl').value,
            homework_task: document.getElementById('homeworkTask').value,
            test_data: testData,
            scheduled_start: lessonType === 'sync' ? document.getElementById('scheduledStart').value : null,
            duration_minutes: parseInt(document.getElementById('durationMinutes').value),
            enable_recording: document.getElementById('enableRecording').checked
        };
        
        try {
            const res = await fetch('/api/teacher/lessons/create/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (result.success) {
                document.getElementById('modalMessage').innerHTML = `<div class="success-msg">✅ ${result.message}</div>`;
                setTimeout(() => {
                    closeModal();
                    loadTeacherData();
                }, 1500);
            } else {
                document.getElementById('modalMessage').innerHTML = `<div class="error">❌ ${result.message || 'Ошибка'}</div>`;
            }
        } catch(e) {
            document.getElementById('modalMessage').innerHTML = `<div class="error">❌ Ошибка: ${e.message}</div>`;
        }
    }
    
    function editLesson(id) {
        alert(`Редактирование урока #${id} будет доступно позже`);
    }
    
    function doLogout() {
        currentUser = null;
        document.getElementById('loginView').style.display = 'block';
        document.getElementById('dashboardView').classList.add('hidden');
    }
</script>
</body>
</html>
