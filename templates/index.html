<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xialin - Китайский язык онлайн</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fb; }
        .container { max-width: 400px; margin: 100px auto; background: white; border-radius: 28px; padding: 40px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 30px; cursor: pointer; margin-top: 16px; }
        .error { color: #ef4444; margin-top: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="loginView" class="container">
        <h2 style="text-align: center; margin-bottom: 24px;">🎓 Xialin</h2>
        <p style="text-align: center; margin-bottom: 24px;">Школа китайского языка</p>
        <input type="text" id="username" placeholder="Логин" value="student">
        <input type="password" id="password" placeholder="Пароль" value="student123">
        <button onclick="doLogin()">Войти</button>
        <div id="loginError" class="error hidden"></div>
    </div>

    <div id="dashboardContainer"></div>

    <script>
        let currentUser = null;

        async function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentUser = data.user;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    document.getElementById('loginView').style.display = 'none';
                    
                    // Загружаем соответствующую панель
                    if (currentUser.role === 'teacher') {
                        loadTeacherPanel();
                    } else {
                        loadStudentDashboard();
                    }
                } else {
                    document.getElementById('loginError').innerText = 'Ошибка входа';
                    document.getElementById('loginError').classList.remove('hidden');
                }
            } catch(e) {
                document.getElementById('loginError').innerText = 'Ошибка подключения';
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        async function loadTeacherPanel() {
            const container = document.getElementById('dashboardContainer');
            const res = await fetch('/teacher-panel-content/');
            const html = await res.text();
            container.innerHTML = html;
            
            // Загружаем скрипты учителя
            const script = document.createElement('script');
            script.src = '/static/js/teacher-panel.js';
            document.body.appendChild(script);
        }

        async function loadStudentDashboard() {
            const container = document.getElementById('dashboardContainer');
            const res = await fetch('/');
            // Перенаправляем на страницу ученика
            window.location.href = '/student/';
        }

        // Проверка сохранённой сессии
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('loginView').style.display = 'none';
            if (currentUser.role === 'teacher') {
                loadTeacherPanel();
            } else {
                window.location.href = '/student/';
            }
        }
    </script>
</body>
</html>
