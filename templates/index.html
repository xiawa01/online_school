<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xialin - Школа китайского языка</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { background: white; border-radius: 28px; padding: 48px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { font-size: 32px; margin-bottom: 8px; color: #1e293b; }
        .subtitle { color: #64748b; margin-bottom: 32px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 40px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; }
        button:hover { background: #2563eb; }
        .error { color: #ef4444; background: #fee2e2; padding: 12px; border-radius: 12px; margin-top: 16px; font-size: 14px; }
        .hidden { display: none; }
        .demo-info { margin-top: 24px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎓 Xialin</h1>
        <p class="subtitle">Школа китайского языка онлайн</p>
        
        <input type="text" id="username" placeholder="Логин" value="student">
        <input type="password" id="password" placeholder="Пароль" value="student123">
        <button onclick="doLogin()">Войти</button>
        
        <div id="errorMsg" class="error hidden"></div>
        
        <div class="demo-info">
            🔑 Тестовые данные:<br>
            Ученик: student / student123<br>
            Учитель: teacher / teacher123
        </div>
    </div>

    <script>
        async function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch('/api/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    if (data.user.role === 'teacher') {
                        window.location.href = '/teacher/';
                    } else {
                        window.location.href = '/student/';
                    }
                } else {
                    errorDiv.textContent = data.message || 'Ошибка входа';
                    errorDiv.classList.remove('hidden');
                }
            } catch(e) {
                errorDiv.textContent = 'Ошибка подключения к серверу';
                errorDiv.classList.remove('hidden');
            }
        }
        
        // Enter key press
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>
</html>
