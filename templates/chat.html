<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат - Anecole</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f5f7fb; }
        .chat-container { display: flex; height: 100vh; }
        .sidebar { width: 300px; background: white; border-right: 1px solid #e9eef3; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #e9eef3; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 16px; cursor: pointer; border-bottom: 1px solid #f0f4f9; display: flex; align-items: center; gap: 12px; }
        .chat-item:hover { background: #f8fafc; }
        .chat-item.active { background: #dbeafe; }
        .avatar { width: 48px; height: 48px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; }
        .chat-last-message { font-size: 12px; color: #8e9aaf; }
        .main-chat { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-header { padding: 20px; border-bottom: 1px solid #e9eef3; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 16px; display: flex; }
        .message.sent { justify-content: flex-end; }
        .message.received { justify-content: flex-start; }
        .message-bubble { max-width: 60%; padding: 12px 16px; border-radius: 20px; }
        .message.sent .message-bubble { background: #3b82f6; color: white; }
        .message.received .message-bubble { background: #f1f5f9; color: #1e293b; }
        .message-time { font-size: 10px; margin-top: 4px; opacity: 0.7; }
        .input-area { padding: 20px; border-top: 1px solid #e9eef3; display: flex; gap: 12px; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 30px; }
        .typing-indicator { font-size: 12px; color: #8e9aaf; padding: 8px 20px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>💬 Сообщения</h3>
            </div>
            <div class="chat-list" id="chatList">
                <div class="chat-item active" onclick="selectChat('course', 1)">
                    <div class="avatar">📚</div>
                    <div class="chat-info">
                        <div class="chat-name">Общий чат курса</div>
                        <div class="chat-last-message">Добро пожаловать!</div>
                    </div>
                </div>
                <div class="chat-item" onclick="selectChat('user', 2)">
                    <div class="avatar">👤</div>
                    <div class="chat-info">
                        <div class="chat-name">Учитель Анна</div>
                        <div class="chat-last-message">Как дела?</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-chat">
            <div class="chat-header">
                <h3 id="chatTitle">Общий чат</h3>
                <button onclick="window.location.href='/'">🏠 На главную</button>
            </div>
            <div class="messages" id="messages"></div>
            <div class="typing-indicator hidden" id="typingIndicator">✏️ кто-то печатает...</div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentChatType = 'course';
        let currentChatId = 1;
        let typingTimeout = null;
        
        function connectWebSocket() {
            const wsUrl = `ws://${window.location.host}/ws/chat/${currentChatType === 'course' ? currentChatId : 'private/'}`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => console.log('WebSocket connected');
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'message') {
                    addMessage(data.sender, data.message, data.sender_id === 1);
                } else if (data.type === 'typing') {
                    showTypingIndicator(data.sender, data.is_typing);
                }
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }
        
        function addMessage(sender, message, isSent) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${isSent ? 'sent' : 'received'}`;
            div.innerHTML = `
                <div class="message-bubble">
                    <div>${message}</div>
                    <div class="message-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value;
            if (!message || !ws) return;
            
            ws.send(JSON.stringify({ type: 'message', message }));
            addMessage('Вы', message, true);
            input.value = '';
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
            if (ws) {
                ws.send(JSON.stringify({ type: 'typing', is_typing: true }));
                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    ws.send(JSON.stringify({ type: 'typing', is_typing: false }));
                }, 1000);
            }
        }
        
        function selectChat(type, id) {
            currentChatType = type;
            currentChatId = id;
            document.getElementById('chatTitle').innerText = type === 'course' ? 'Общий чат курса' : 'Личный чат';
            if (ws) ws.close();
            connectWebSocket();
            document.getElementById('messages').innerHTML = '';
        }
        
        function showTypingIndicator(sender, isTyping) {
            const indicator = document.getElementById('typingIndicator');
            if (isTyping) {
                indicator.innerHTML = `✏️ ${sender} печатает...`;
                indicator.classList.remove('hidden');
            } else {
                indicator.classList.add('hidden');
            }
        }
        
        connectWebSocket();
    </script>
</body>
</html>
