services:
  - type: web
    name: anecole
    runtime: python
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: anecole-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: anecole-redis
          property: connectionString

  - type: redis
    name: anecole-redis
    plan: free

databases:
  - name: anecole-db
    plan: free
    databaseName: anecole
    user: anecole
